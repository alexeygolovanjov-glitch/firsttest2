services:
  web:
    build: .
    container_name: firsttest-cinema
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-FirstTest Cinema}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-change-this-token}
      DATABASE_PATH: ${DATABASE_PATH:-/data/app.db}
      KINOPOISK_API_KEY: ${KINOPOISK_API_KEY:-}
      KINOBD_API_URL: ${KINOBD_API_URL:-https://kinobd.net}
      KINOBD_TOKEN: ${KINOBD_TOKEN:-}
      PLAYER_API_USER_AGENT: ${PLAYER_API_USER_AGENT:-Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36}
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - ./data:/data
