<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FirstTest Cinema</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <div id="lockScreen" class="lock-screen">
      <form id="loginForm" class="login-panel">
        <p class="eyebrow">Личный кинотеатр</p>
        <h1>FirstTest Cinema</h1>
        <input id="passwordInput" type="password" placeholder="Пароль" autocomplete="current-password" required />
        <button type="submit">Войти</button>
        <p id="loginError" class="error" hidden>Пароль не подошел</p>
      </form>
    </div>

    <div id="appShell" class="shell app-hidden">
      <header class="topbar">
        <div>
          <p class="eyebrow">Личный кинотеатр</p>
          <h1>FirstTest Cinema</h1>
        </div>
        <div class="admin-box">
          <span id="tokenStatus">Вход выполнен</span>
          <button id="logoutButton" class="icon-button" title="Выйти">↪</button>
        </div>
      </header>

      <main class="workspace">
        <section class="library">
          <div class="toolbar">
            <input id="searchInput" type="search" placeholder="Найти фильм" />
            <select id="statusFilter" aria-label="Фильтр списка">
              <option value="all">Все</option>
              <option value="planned">В планах</option>
              <option value="watching">Смотрю</option>
              <option value="watched">Просмотрено</option>
              <option value="favorite">Любимое</option>
            </select>
          </div>
          <div id="movies" class="movie-grid" aria-live="polite"></div>
        </section>

        <aside class="details" id="details">
          <div class="empty-state">
            <span>Найди фильм</span>
            <p>Клик по обложке подгрузит плееры.</p>
          </div>
        </aside>
      </main>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="/assets/app.js" type="module"></script>
  </body>
</html>
