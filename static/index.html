<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Личный кинотеатр</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <div id="lockScreen" class="lock-screen">
      <form id="loginForm" class="login-panel">
        <p class="eyebrow">Личный кинотеатр</p>
        <input id="passwordInput" type="password" placeholder="Пароль" autocomplete="current-password" required />
        <button type="submit">Войти</button>
        <p id="loginError" class="error" hidden>Пароль не подошел</p>
      </form>
    </div>

    <div id="appShell" class="shell app-hidden">
      <header class="topbar">
        <div>
          <p class="eyebrow">Личный кинотеатр</p>
        </div>
        <div class="admin-box">
          <div class="profile-switcher" aria-label="Профиль">
            <select id="profileSelect"></select>
            <button id="deleteProfileButton" class="icon-button danger-button" type="button" title="Удалить профиль">×</button>
            <button id="newProfileButton" class="icon-button" type="button" title="Добавить профиль">＋</button>
          </div>
          <span id="tokenStatus">Вход выполнен</span>
          <button id="logoutButton" class="icon-button" title="Выйти">↪</button>
        </div>
      </header>

      <main class="workspace">
        <section class="library">
          <div class="toolbar">
            <input id="searchInput" type="search" placeholder="Найти фильм" />
            <select id="statusFilter" aria-label="Фильтр списка">
              <option value="all">Все</option>
              <option value="planned">В планах</option>
              <option value="watching">Смотрю</option>
              <option value="watched">Просмотрено</option>
              <option value="favorite">Любимое</option>
            </select>
          </div>
          <div id="movies" class="movie-grid" aria-live="polite"></div>
        </section>

        <aside class="details" id="details">
          <div class="empty-state">
            <span>Найди фильм</span>
            <p>Клик по обложке подгрузит плееры.</p>
          </div>
        </aside>
      </main>
    </div>

    <dialog id="profileDialog">
      <form id="profileForm" method="dialog">
        <h2>Новый профиль</h2>
        <label>
          Имя
          <input id="profileNameInput" type="text" maxlength="80" placeholder="Например, Алиса" required />
        </label>
        <div>
          <p class="field-label">Аватарка</p>
          <div id="avatarPicker" class="avatar-grid" aria-label="Выбор аватарки"></div>
        </div>
        <div class="dialog-actions">
          <button id="cancelProfileButton" class="secondary-button" type="button">Отмена</button>
          <button type="submit">Создать</button>
        </div>
      </form>
    </dialog>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="/assets/app.js" type="module"></script>
  </body>
</html>
